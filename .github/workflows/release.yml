name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build
        working-directory: web
        run: npm ci && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  build-swagger:
    name: Generate Swagger Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate
        run: swag init -g cmd/server/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagger-docs
          path: docs/

  release-docker:
    name: Build & Push Docker + Linux
    needs: [build-frontend, build-swagger]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Compute versions and image name
        run: |
          echo "VERSION_BARE=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY@L}" >> "$GITHUB_ENV"

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Download swagger docs
        uses: actions/download-artifact@v4
        with:
          name: swagger-docs
          path: docs/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION_BARE }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (linux/amd64)
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Version=${{ env.VERSION_BARE }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Commit=${{ github.sha }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-server-linux-amd64 ./cmd/server

      - name: Build (linux/arm64)
        run: |
          LDFLAGS="-s -w \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Version=${{ env.VERSION_BARE }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Commit=${{ github.sha }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-server-linux-arm64 ./cmd/server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  release-windows:
    name: Build Windows
    needs: [build-frontend, build-swagger]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Download swagger docs
        uses: actions/download-artifact@v4
        with:
          name: swagger-docs
          path: docs/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate Windows PE resource
        run: |
          $VERSION_BARE = "${{ github.ref_name }}".TrimStart('v')
          $GOPATH = go env GOPATH
          & "$GOPATH\bin\goversioninfo.exe" `
            -file-version="$VERSION_BARE" `
            -product-version="$VERSION_BARE" `
            -propagate-ver-strings `
            -o cmd/server/resource_windows_amd64.syso `
            cmd/server/versioninfo.json

      - name: Build (windows/amd64)
        run: |
          $VERSION_BARE = "${{ github.ref_name }}".TrimStart('v')
          $LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-server/internal/version.Version=$VERSION_BARE -X github.com/tlsentinel/tlsentinel-server/internal/version.Commit=${{ github.sha }} -X github.com/tlsentinel/tlsentinel-server/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"
          New-Item -ItemType Directory -Force -Path dist
          $env:CGO_ENABLED="0"; $env:GOOS="windows"; $env:GOARCH="amd64"
          go build -ldflags="$LDFLAGS" -o dist/tlsentinel-server-windows-amd64.exe ./cmd/server

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows Binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: dennis-koch
          certificate-profile-name: public-trust
          files-folder: ./dist
          files-folder-filter: exe

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tlsentinel-server-windows-amd64.exe

  release-macos:
    name: Build macOS
    needs: [build-frontend, build-swagger]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Download swagger docs
        uses: actions/download-artifact@v4
        with:
          name: swagger-docs
          path: docs/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (darwin/amd64)
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Version=${GITHUB_REF_NAME#v} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Commit=${{ github.sha }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-server-darwin-amd64 ./cmd/server

      - name: Build (darwin/arm64)
        run: |
          LDFLAGS="-s -w \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Version=${GITHUB_REF_NAME#v} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.Commit=${{ github.sha }} \
            -X github.com/tlsentinel/tlsentinel-server/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-server-darwin-arm64 ./cmd/server

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
